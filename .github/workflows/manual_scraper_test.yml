name: Manual Scraper Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-scrapers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run macro scraper without committing
        run: python -m scrapers.run_daily_scrape
      - name: Run institutional tracker without committing
        run: python institutional_tracker.py
