name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r macro_scraper/requirements.txt pytest ruff black pip-audit
      - name: Ruff
        run: ruff check .
      - name: Black (check)
        run: black --check .
      - name: Pytest
        run: pytest tests
      - name: pip-audit
        run: pip-audit || true
